name: Cross-Platform Tests

on:
  push:
    branches: ["main"]
  pull_request:
    branches: ["main"]
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: cross-platform-tests-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  CARGO_TERM_COLOR: always
  APP_FEATURES: --no-default-features --features gix

jobs:
  windows-tests:
    name: Windows Tests (aarch64-windows)
    runs-on: windows-11-arm
    timeout-minutes: 60
    steps:
      - uses: actions/checkout@v6
      - name: Show Git version
        shell: pwsh
        run: git --version
      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
      - name: Cache Rust artifacts
        uses: Swatinem/rust-cache@v2
      - name: Show path behavior (PowerShell + Git Bash)
        shell: pwsh
        run: |
          Write-Host "PowerShell path: $pwd"
          $bashPwd = bash -lc "pwd"
          Write-Host "Git Bash path: $bashPwd"
      - name: Enable WER full dumps for Windows ARM test crashes
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force C:\CrashDumps | Out-Null
          reg add "HKLM\SOFTWARE\Microsoft\Windows\Windows Error Reporting\LocalDumps" /v DumpFolder /t REG_EXPAND_SZ /d C:\CrashDumps /f
          reg add "HKLM\SOFTWARE\Microsoft\Windows\Windows Error Reporting\LocalDumps" /v DumpType /t REG_DWORD /d 2 /f
          reg add "HKLM\SOFTWARE\Microsoft\Windows\Windows Error Reporting\LocalDumps" /v DumpCount /t REG_DWORD /d 10 /f
      - name: Run headless test suite (PowerShell)
        shell: pwsh
        run: |
          cargo test --workspace `
            --exclude gitcomet-ui `
            --exclude gitcomet-ui-gpui `
            --no-default-features `
            --features gix `
            --locked `
            --verbose
      - name: Upload Windows ARM crash artifacts
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: windows-arm64-crash-artifacts
          if-no-files-found: warn
          path: |
            C:\CrashDumps\*.dmp
            target\**\*.pdb
            target\**\gitcomet*.exe
      - name: Run standalone smoke test in CMD
        shell: cmd
        run: cargo test -p gitcomet --no-default-features --features gix --test standalone_tool_mode_integration help_flag_exits_zero -- --exact
      - name: Show path behavior (CMD + Git Bash)
        shell: cmd
        run: |
          echo CMD path: %CD%
          for /f "delims=" %%i in ('bash -lc "pwd"') do set BASH_PWD=%%i
          echo Git Bash path: %BASH_PWD%
